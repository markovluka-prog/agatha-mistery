name: Moderation Agent

on:
  schedule:
    # Каждые 10 минут — проверяет pending-записи в Supabase
    - cron: '*/10 * * * *'
  workflow_dispatch:
    # Можно запустить вручную из GitHub Actions

jobs:
  moderate:
    name: Run Moderation Agent
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tools/moderation/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: tools/moderation

      - name: Run moderation agent (single poll)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: openai/gpt-4o-mini
          VISION_MODEL: openai/gpt-4o-mini
          # POLL_INTERVAL_MS не нужен — скрипт запускается однократно
          SINGLE_RUN: 'true'
        run: node agent-runner.js
        working-directory: tools/moderation
