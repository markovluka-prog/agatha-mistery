name: Quiz Question Rewriter

on:
  workflow_dispatch:
    # Запускается вручную из вкладки Actions на GitHub

jobs:
  rewrite:
    name: Rewrite Quiz Questions
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run quiz rewriter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node rewrite.js
        working-directory: tools/quiz-rewrite
